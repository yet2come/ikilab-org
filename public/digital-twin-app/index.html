<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>操作デモ（簡素化モデル）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.149.0/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;font-family:'Helvetica Neue',Arial,'Hiragino Sans',sans-serif;overflow:hidden;color:#e2e8f0}
canvas{display:block}
.header{position:absolute;top:0;left:0;right:0;padding:14px 24px;
  background:linear-gradient(180deg,rgba(10,14,26,.95),rgba(10,14,26,0));
  z-index:10;display:flex;align-items:center;gap:16px}
.header h1{font-size:18px;font-weight:700;letter-spacing:2px;color:#94d3fc}
.header .sub{font-size:12px;color:#64748b}
.panel{position:absolute;top:70px;right:20px;z-index:10;
  background:rgba(15,23,42,.88);backdrop-filter:blur(12px);
  border:1px solid rgba(148,211,252,.15);border-radius:14px;
  padding:18px 20px;width:240px}
.panel h2{font-size:13px;font-weight:600;color:#94d3fc;margin-bottom:12px;letter-spacing:1px}
.layer-row{display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;user-select:none}
.layer-row:last-child{border-bottom:none}
.layer-toggle{width:36px;height:20px;border-radius:10px;position:relative;transition:background .25s}
.layer-toggle.on{background:#3b82f6}
.layer-toggle.off{background:#334155}
.layer-toggle::after{content:'';position:absolute;top:2px;width:16px;height:16px;
  border-radius:50%;background:#fff;transition:left .25s}
.layer-toggle.on::after{left:18px}
.layer-toggle.off::after{left:2px}
.layer-name{font-size:13px;font-weight:500}
.layer-color{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.slider-group{margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,.08)}
.slider-group label{font-size:11px;color:#64748b;display:block;margin-bottom:6px}
.slider-group input[type=range]{width:100%;accent-color:#3b82f6}
.info{position:absolute;bottom:20px;left:20px;z-index:10;
  background:rgba(15,23,42,.85);backdrop-filter:blur(10px);
  border:1px solid rgba(148,211,252,.12);border-radius:12px;
  padding:14px 18px;font-size:12px;color:#94a3b8;line-height:1.7}
.info kbd{background:rgba(255,255,255,.1);border-radius:4px;padding:2px 6px;font-size:11px;color:#cbd5e1}
.tooltip{position:absolute;z-index:20;background:rgba(15,23,42,.95);
  border:1px solid rgba(148,211,252,.3);border-radius:8px;
  padding:8px 12px;font-size:12px;pointer-events:none;display:none;max-width:220px;line-height:1.5}
.tooltip .tt-name{font-weight:600;color:#94d3fc}
.tooltip .tt-desc{color:#94a3b8;margin-top:2px}
.cbtn{flex:1;padding:6px 0;border:1px solid rgba(148,211,252,.2);border-radius:8px;
  background:rgba(30,41,59,.7);color:#94a3b8;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.cbtn:hover{background:rgba(59,130,246,.25);color:#e2e8f0}
.cbtn.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.panel-header{cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.panel-arrow{font-size:10px;transition:transform .25s}
.panel.is-collapsed .panel-arrow{transform:rotate(-90deg)}
.panel-body{overflow:hidden;max-height:500px;transition:max-height .3s ease,opacity .25s;opacity:1}
.panel.is-collapsed .panel-body{max-height:0;opacity:0}
.panel.is-collapsed{padding-bottom:14px}
</style>
</head>
<body>
<div class="header">
  <span class="sub">OpenStreetMap 実データ ｜ レイヤー分離表示</span>
</div>
<div class="panel" id="panel">
  <h2 class="panel-header" id="panel-toggle">▶︎ レイヤーメニュー <span class="panel-arrow">▾</span></h2>
  <div class="panel-body" id="panel-body">
  <div class="layer-row" data-layer="terrain">
    <div class="layer-color" style="background:#22d3ee"></div>
    <span class="layer-name">地形</span>
    <div class="layer-toggle off" id="tog-terrain"></div>
  </div>
  <div class="layer-row" data-layer="roads">
    <div class="layer-color" style="background:#f59e0b"></div>
    <span class="layer-name">幹線道路</span>
    <div class="layer-toggle on" id="tog-roads"></div>
  </div>
  <div class="layer-row" data-layer="hubs">
    <div class="layer-color" style="background:#f472b6"></div>
    <span class="layer-name">交通拠点</span>
    <div class="layer-toggle on" id="tog-hubs"></div>
  </div>
  <div class="layer-row" data-layer="coastline">
    <div class="layer-color" style="background:#60a5fa"></div>
    <span class="layer-name">海岸線</span>
    <div class="layer-toggle on" id="tog-coastline"></div>
  </div>
  <div class="slider-group">
    <label>レイヤー間隔（分離距離）</label>
    <input type="range" id="separation" min="0" max="30" value="0" step="1">
  </div>
  <div class="slider-group">
    <label>標高の強調倍率</label>
    <input type="range" id="exaggeration" min="1" max="20" value="8" step="1">
  </div>
  <div class="slider-group">
    <label>等高線の間隔 (m)</label>
    <div style="display:flex;gap:6px;margin-top:6px" id="contourBtns">
      <button class="cbtn" data-v="0">なし</button>
      <button class="cbtn" data-v="5">5</button>
      <button class="cbtn active" data-v="10">10</button>
      <button class="cbtn" data-v="20">20</button>
    </div>
  </div>
  </div>
</div>
<div class="info">
  <kbd>ドラッグ</kbd> 回転 &nbsp; <kbd>スクロール</kbd> ズーム &nbsp; <kbd>右ドラッグ</kbd> 移動<br>
  データ: © OpenStreetMap contributors
</div>
<div class="tooltip" id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-desc" id="tt-desc"></div>
</div>

function buildCoastline() {
  coastlineGroup = new THREE.Group();
  scene.add(coastlineGroup);
  const pts = coastlineCoords.map(c => {
    const [x, z] = geo(c[0], c[1]);
    return new THREE.Vector3(x, .5, z);
  });
  pts.push(pts[0].clone());
  const g = new THREE.BufferGeometry().setFromPoints(pts);
  coastlineGroup.add(new THREE.Line(g, new THREE.LineBasicMaterial({ color: 0x60a5fa, transparent: true, opacity: .9 })));
  const gl = new THREE.Line(g.clone(), new THREE.LineBasicMaterial({ color: 0x60a5fa, transparent: true, opacity: .25 }));
  gl.position.y = -.3;
  coastlineGroup.add(gl);

  ISLANDS_RAW.forEach(island => {
    const coords = island.coords.split(';').map(s => { const [a, b] = s.split(','); return [+a, +b]; });
    const ip = coords.map(c => { const [x, z] = geo(c[0], c[1]); return new THREE.Vector3(x, .5, z); });
    ip.push(ip[0].clone());
    const ig = new THREE.BufferGeometry().setFromPoints(ip);
    coastlineGroup.add(new THREE.Line(ig, new THREE.LineBasicMaterial({ color: 0x38bdf8, transparent: true, opacity: .85 })));
    const igl = new THREE.Line(ig.clone(), new THREE.LineBasicMaterial({ color: 0x38bdf8, transparent: true, opacity: .2 }));
    igl.position.y = -.3;
    coastlineGroup.add(igl);

    const cx = coords.reduce((s, c) => s + c[0], 0) / coords.length;
    const cy = coords.reduce((s, c) => s + c[1], 0) / coords.length;
    const [lx, lz] = geo(cx, cy);
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#38bdf8';
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(island.name, 128, 32);
    const tex = new THREE.CanvasTexture(canvas);
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: .9 }));
    sp.position.set(lx, 2, lz);
    sp.scale.set(6, 1.5, 1);
    coastlineGroup.add(sp);
  });
}

function buildTerrain() {
  terrainGroup = new THREE.Group();
  scene.add(terrainGroup);
  const R = 65, latMin = 33.700, latMax = 33.865, LM = 129.638, lngMax = 129.795;
  const verts = [], idx = [], cols = [], grid = [];

  for (let i = 0; i <= R; i++) {
    grid[i] = [];
    for (let j = 0; j <= R; j++) {
      const lat = latMin + (latMax - latMin) * (i / R);
      const lng = LM + (lngMax - LM) * (j / R);
      const [x, z] = geo(lat, lng);
      const isIn = inside(lat, lng);
      const elev = isIn ? getElev(lat, lng) / ELEV_MAX : 0;
      grid[i][j] = { x, z, elev, inside: isIn };
      verts.push(x, elev * exagVal, z);
      const t = elev;
      cols.push(.05 + t * .35, .55 + t * .35, .78 + t * .2);
    }
  }

  for (let i = 0; i < R; i++) {
    for (let j = 0; j < R; j++) {
      const a = i * (R + 1) + j, b = a + 1, c = a + (R + 1), d = c + 1;
      if (grid[i][j].inside || grid[i][j + 1].inside || grid[i + 1][j].inside || grid[i + 1][j + 1].inside) {
        idx.push(a, b, d);
        idx.push(a, d, c);
      }
    }
  }

  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  g.setAttribute('color', new THREE.Float32BufferAttribute(cols, 3));
  g.setIndex(idx);
  // No computeVertexNormals needed for wireframe rendering
  terrainGroup.add(new THREE.Mesh(g, new THREE.MeshBasicMaterial({
    vertexColors: true, wireframe: true, transparent: true, opacity: .65
  })));
}

// Shared marching squares: extract contour segments from a grid into levelSegments map
function marchGrid(elevGrid, rows, cols, latMin, latMax, lngMin, lngMax, levelSegments) {
  const maxElev = ELEV_MAX;
  function lerpVal(v0, v1, t) { return v0 + (v1 - v0) * t; }

  if (contourInterval <= 0) return;
  for (let lev = contourInterval; lev <= maxElev; lev += contourInterval) {
    if (!levelSegments[lev]) levelSegments[lev] = [];

    for (let i = 0; i < rows; i++) {
      for (let j = 0; j < cols; j++) {
        const v00 = elevGrid[i][j], v10 = elevGrid[i + 1][j];
        const v01 = elevGrid[i][j + 1], v11 = elevGrid[i + 1][j + 1];
        if (v00 === 0 && v10 === 0 && v01 === 0 && v11 === 0) continue;

        let code = 0;
        if (v00 >= lev) code |= 1;
        if (v10 >= lev) code |= 2;
        if (v11 >= lev) code |= 4;
        if (v01 >= lev) code |= 8;
        if (code === 0 || code === 15) continue;

        function gridToWorld(gi, gj) {
          const lat = latMin + (latMax - latMin) * (gi / rows);
          const lng = lngMin + (lngMax - lngMin) * (gj / cols);
          const [x, z] = geo(lat, lng);
          return new THREE.Vector3(x, lev / ELEV_MAX * exagVal, z);
        }

        function edgePoint(i0, j0, v0, i1, j1, v1) {
          const t = (lev - v0) / (v1 - v0);
          return gridToWorld(lerpVal(i0, i1, t), lerpVal(j0, j1, t));
        }

        const eB = () => edgePoint(i, j, v00, i + 1, j, v10);
        const eR = () => edgePoint(i + 1, j, v10, i + 1, j + 1, v11);
        const eT = () => edgePoint(i, j + 1, v01, i + 1, j + 1, v11);
        const eL = () => edgePoint(i, j, v00, i, j + 1, v01);

        const cases = {
          1: [eB, eL], 2: [eB, eR], 3: [eL, eR], 4: [eR, eT],
          5: [[eB, eR], [eL, eT]], 6: [eB, eT], 7: [eL, eT],
          8: [eL, eT], 9: [eB, eT], 10: [[eB, eL], [eR, eT]],
          11: [eR, eT], 12: [eL, eR], 13: [eB, eR], 14: [eB, eL]
        };

        const c = cases[code];
        if (!c) continue;
        if (Array.isArray(c[0])) {
          c.forEach(pair => { levelSegments[lev].push(pair[0](), pair[1]()); });
        } else {
          levelSegments[lev].push(c[0](), c[1]());
        }
      }
    }
  }
}

function buildContours() {
  contoursGroup = new THREE.Group();
  scene.add(contoursGroup);

  const levelSegments = {};

  // Main island grid
  const R = 80, latMin = 33.700, latMax = 33.865, LM = 129.638, lngMax = 129.795;
  const elevGrid = [];
  for (let i = 0; i <= R; i++) {
    elevGrid[i] = [];
    for (let j = 0; j <= R; j++) {
      const lat = latMin + (latMax - latMin) * (i / R);
      const lng = LM + (lngMax - LM) * (j / R);
      elevGrid[i][j] = inside(lat, lng) ? getElev(lat, lng) : 0;
    }
  }
  marchGrid(elevGrid, R, R, latMin, latMax, LM, lngMax, levelSegments);

  // Secondary islands
  Object.values(ISLAND_ELEV).forEach(isl => {
    const { latMin: la0, latMax: la1, lngMin: lo0, lngMax: lo1, rows, cols, data } = isl;
    const maxE = Math.max(...data);
    if (maxE <= 0) return;
    const grid = [];
    for (let r = 0; r <= rows - 1; r++) {
      grid[r] = [];
      for (let c = 0; c <= cols - 1; c++) {
        grid[r][c] = data[r * cols + c] || 0;
      }
    }
    marchGrid(grid, rows - 1, cols - 1, la0, la1, lo0, lo1, levelSegments);
  });

  // Render all levels
  function contourColor(h) {
    const t = h / ELEV_MAX;
    return new THREE.Color(
      'rgb(' + Math.floor(120 + 135 * t) + ',' + Math.floor(80 + 175 * t) + ',' + Math.floor(200 + 55 * t) + ')'
    );
  }

  Object.keys(levelSegments).forEach(levStr => {
    const lev = +levStr;
    const pairs = levelSegments[lev];
    if (pairs.length === 0) return;

    const isMajor = (lev % 50 === 0);
    const positions = new Float32Array(pairs.length * 3);
    for (let k = 0; k < pairs.length; k++) {
      positions[k * 3] = pairs[k].x;
      positions[k * 3 + 1] = pairs[k].y;
      positions[k * 3 + 2] = pairs[k].z;
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    const color = contourColor(lev);
    const opacity = isMajor ? 0.85 : 0.5;
    contoursGroup.add(new THREE.LineSegments(g, new THREE.LineBasicMaterial({ color, transparent: true, opacity })));

    // Major contour labels
    if (isMajor && pairs.length >= 2) {
      const midIdx = Math.floor(pairs.length / 2) & ~1;
      const midPt = pairs[midIdx].clone().lerp(pairs[midIdx + 1], .5);
      const cv = document.createElement('canvas');
      const ctx = cv.getContext('2d');
      cv.width = 128; cv.height = 48;
      ctx.font = 'bold 22px Helvetica Neue,Arial,sans-serif';
      ctx.fillStyle = '#c4b5fd';
      ctx.textAlign = 'center';
      ctx.fillText(lev + 'm', 64, 32);
      const sp = new THREE.Sprite(new THREE.SpriteMaterial({
        map: new THREE.CanvasTexture(cv), transparent: true, opacity: .75
      }));
      sp.position.copy(midPt);
      sp.position.y += .5;
      sp.scale.set(6, 2.5, 1);
      contoursGroup.add(sp);
    }
  });
}

function buildRoads() {
  roadsGroup = new THREE.Group();
  scene.add(roadsGroup);
  const colors = { trunk: 0xef4444, primary: 0xf59e0b, secondary: 0xfbbf24, tertiary: 0x86efac };
  const opac = { trunk: 1, primary: .95, secondary: .7, tertiary: .5 };

  // Group road segments by type, then batch into one LineSegments per type
  const typePositions = { trunk: [], primary: [], secondary: [], tertiary: [] };

  roadData.forEach(road => {
    if (road.pts.length < 2) return;

    const pts = road.pts.map(p => {
      const [x, z] = geo(p[0], p[1]);
      const elev = inside(p[0], p[1]) ? getElev(p[0], p[1]) / ELEV_MAX * exagVal + .3 : .3;
      return new THREE.Vector3(x, elev, z);
    });

    let points = pts;
    if (pts.length >= 3) {
      try {
        points = new THREE.CatmullRomCurve3(pts).getPoints(Math.min(pts.length * 2, 80));
      } catch (e) {}
    }

    // Convert polyline to pairs of consecutive points for LineSegments
    const arr = typePositions[road.type] || typePositions.tertiary;
    for (let k = 0; k < points.length - 1; k++) {
      arr.push(points[k].x, points[k].y, points[k].z);
      arr.push(points[k + 1].x, points[k + 1].y, points[k + 1].z);
    }
  });

  // Create one LineSegments per road type
  Object.keys(typePositions).forEach(type => {
    const posArr = typePositions[type];
    if (posArr.length === 0) return;
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(new Float32Array(posArr), 3));
    roadsGroup.add(new THREE.LineSegments(g, new THREE.LineBasicMaterial({
      color: colors[type] || 0xfde68a, transparent: true, opacity: opac[type] || .5
    })));
  });
}

function buildHubs() {
  hubsGroup = new THREE.Group();
  scene.add(hubsGroup);
  hubMeshes = [];

  hubData.forEach(hub => {
    const [x, z] = geo(hub.lat, hub.lng);
    const be = inside(hub.lat, hub.lng) ? getElev(hub.lat, hub.lng) / ELEV_MAX * exagVal + .5 : .5;
    let geometry, color;

    if (hub.type === 'port') {
      geometry = new THREE.OctahedronGeometry(1.8, 0);
      color = 0xf472b6;
    } else if (hub.type === 'airport') {
      geometry = new THREE.ConeGeometry(1.5, 3, 4);
      color = 0xa78bfa;
    } else {
      geometry = new THREE.SphereGeometry(1.2, 8, 6);
      color = 0x34d399;
    }

    const mesh = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({
      color, wireframe: true, transparent: true, opacity: .9
    }));
    mesh.position.set(x, be, z);
    mesh.userData = { name: hub.name, desc: hub.desc };
    hubsGroup.add(mesh);
    hubMeshes.push(mesh);

    const lg = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(x, 0, z), new THREE.Vector3(x, be - 1, z)
    ]);
    hubsGroup.add(new THREE.Line(lg, new THREE.LineBasicMaterial({ color, transparent: true, opacity: .35 })));

    const cv = document.createElement('canvas');
    const ctx = cv.getContext('2d');
    cv.width = 256; cv.height = 64;
    ctx.font = 'bold 26px Helvetica Neue,Arial,sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(hub.name, 128, 40);
    const sp = new THREE.Sprite(new THREE.SpriteMaterial({
      map: new THREE.CanvasTexture(cv), transparent: true, opacity: .85
    }));
    sp.position.set(x, be + 3.5, z);
    sp.scale.set(12, 3, 1);
    hubsGroup.add(sp);
  });
}

function setupOrbit() {
  let drag = false, rDrag = false, px = 0, py = 0;
  let theta = .4, phi = .8, radius = 120, tx = 0, ty = 10, tz = 0;

  function upd() {
    camera.position.set(
      tx + radius * Math.sin(phi) * Math.sin(theta),
      ty + radius * Math.cos(phi),
      tz + radius * Math.sin(phi) * Math.cos(theta)
    );
    camera.lookAt(tx, ty, tz);
  }
  upd();

  // Expose orbit update for animate() inertia
  orbitUpdate = function () {
    if (isAutoRotate) return;
    if (zoomAnim) return; // skip inertia during zoom animation
    theta += vTheta;
    phi = Math.max(.15, Math.min(1.5, phi + vPhi));
    vTheta *= 0.95;
    vPhi *= 0.95;
    // Stop tiny residual motion
    if (Math.abs(vTheta) < 0.0001) vTheta = 0;
    if (Math.abs(vPhi) < 0.0001) vPhi = 0;
    if (vTheta !== 0 || vPhi !== 0) upd();
  };

  // Expose radius/target for zoom animation
  orbitUpdate.getState = function () {
    return { theta, phi, radius, tx, ty, tz };
  };
  orbitUpdate.setState = function (state) {
    if (state.theta !== undefined) theta = state.theta;
    if (state.phi !== undefined) phi = state.phi;
    if (state.radius !== undefined) radius = state.radius;
    if (state.tx !== undefined) tx = state.tx;
    if (state.ty !== undefined) ty = state.ty;
    if (state.tz !== undefined) tz = state.tz;
    upd();
  };

  const el = renderer.domElement;

  el.addEventListener('mousedown', e => {
    drag = true;
    rDrag = e.button === 2;
    px = e.clientX;
    py = e.clientY;
  });
  el.addEventListener('contextmenu', e => e.preventDefault());

  addEventListener('mouseup', () => { drag = false; });

  addEventListener('mousemove', e => {
    if (!drag) return;
    const dx = e.clientX - px, dy = e.clientY - py;
    px = e.clientX;
    py = e.clientY;
    if (rDrag) {
      tx -= dx * .15;
      tz -= dy * .15;
    } else {
      vTheta = -dx * 0.005;
      vPhi = -dy * 0.005;
      theta += vTheta;
      phi = Math.max(.15, Math.min(1.5, phi + vPhi));
    }
    upd();
  });

  el.addEventListener('wheel', e => {
    e.preventDefault();
    radius = Math.max(30, Math.min(300, radius + e.deltaY * .08));
    upd();
  }, { passive: false });

  let ltd = 0;
  el.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      drag = true; rDrag = false;
      px = e.touches[0].clientX;
      py = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      ltd = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  });

  el.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && drag) {
      const dx = e.touches[0].clientX - px, dy = e.touches[0].clientY - py;
      px = e.touches[0].clientX;
      py = e.touches[0].clientY;
      vTheta = -dx * 0.005;
      vPhi = -dy * 0.005;
      theta += vTheta;
      phi = Math.max(.15, Math.min(1.5, phi + vPhi));
      upd();
    } else if (e.touches.length === 2) {
      const d = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      radius = Math.max(30, Math.min(300, radius - (d - ltd) * .3));
      ltd = d;
      upd();
    }
  }, { passive: false });

  el.addEventListener('touchend', () => { drag = false; });

  // Double-click zoom to hub
  el.addEventListener('dblclick', e => {
    const dblMouse = new THREE.Vector2(
      (e.clientX / innerWidth) * 2 - 1,
      -(e.clientY / innerHeight) * 2 + 1
    );
    raycaster.setFromCamera(dblMouse, camera);
    const hits = raycaster.intersectObjects(hubMeshes);
    if (hits.length === 0) return;

    const hubPos = hits[0].object.position.clone();
    // Account for parent group offset
    hubPos.y += hubsGroup.position.y;

    const startPos = camera.position.clone();
    const startTarget = new THREE.Vector3(tx, ty, tz);
    const endTarget = hubPos.clone();

    // Compute end camera position: offset from hub at radius=40
    const dir = startPos.clone().sub(endTarget).normalize();
    const endPos = endTarget.clone().add(dir.multiplyScalar(40));

    let frame = 0;
    const totalFrames = 60;

    zoomAnim = function () {
      frame++;
      const t = frame / totalFrames;
      const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; // easeInOutQuad

      camera.position.lerpVectors(startPos, endPos, ease);
      const currentTarget = new THREE.Vector3().lerpVectors(startTarget, endTarget, ease);
      camera.lookAt(currentTarget);

      if (frame >= totalFrames) {
        // Update orbit state to match final position
        const finalRadius = 40;
        const newTx = endTarget.x, newTy = endTarget.y, newTz = endTarget.z;
        const dx = endPos.x - newTx, dy = endPos.y - newTy, dz = endPos.z - newTz;
        const newPhi = Math.acos(dy / finalRadius);
        const newTheta = Math.atan2(dx, dz);
        orbitUpdate.setState({
          theta: newTheta, phi: newPhi, radius: finalRadius,
          tx: newTx, ty: newTy, tz: newTz
        });
        zoomAnim = null;
      }
    };
  });
}

function setupUI() {
  document.querySelectorAll('.layer-row').forEach(row => {
    row.addEventListener('click', () => {
      const l = row.dataset.layer;
      layerState[l] = !layerState[l];
      document.getElementById('tog-' + l).className = 'layer-toggle ' + (layerState[l] ? 'on' : 'off');
      updateLayers();
    });
  });

  document.getElementById('panel-toggle').addEventListener('click', () => {
    document.getElementById('panel').classList.toggle('is-collapsed');
  });

  document.getElementById('separation').addEventListener('input', e => {
    sepVal = +e.target.value;
    updateLayers();
  });

  document.getElementById('exaggeration').addEventListener('input', e => {
    exagVal = +e.target.value;
    rebuildAll();
  });

  document.querySelectorAll('.cbtn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cbtn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      contourInterval = +btn.dataset.v;
      disposeGroup(contoursGroup);
      buildContours();
      updateLayers();
    });
  });
}

function updateLayers() {
  const s = sepVal;
  coastlineGroup.visible = layerState.coastline;
  coastlineGroup.position.y = -s * .5;
  contoursGroup.visible = layerState.contours;
  contoursGroup.position.y = s * .4;
  terrainGroup.visible = layerState.terrain;
  terrainGroup.position.y = 0;
  roadsGroup.visible = layerState.roads;
  roadsGroup.position.y = s * .8;
  hubsGroup.visible = layerState.hubs;
  hubsGroup.position.y = s * 1.6;
}

function disposeGroup(group) {
  if (!group) return;
  group.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      if (obj.material.map) obj.material.map.dispose();
      obj.material.dispose();
    }
  });
  scene.remove(group);
}

function rebuildAll() {
  disposeGroup(terrainGroup);
  disposeGroup(roadsGroup);
  disposeGroup(hubsGroup);
  disposeGroup(contoursGroup);
  hubMeshes = [];
  buildTerrain();
  buildContours();
  buildIslandTerrain();
  buildRoads();
  buildHubs();
  updateLayers();
}

addEventListener('mousemove', e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(hubMeshes);
  const tt = document.getElementById('tooltip');
  if (hits.length) {
    const d = hits[0].object.userData;
    document.getElementById('tt-name').textContent = d.name;
    document.getElementById('tt-desc').textContent = d.desc;
    tt.style.display = 'block';
    tt.style.left = (e.clientX + 16) + 'px';
    tt.style.top = (e.clientY - 10) + 'px';
    document.body.style.cursor = 'pointer';
  } else {
    tt.style.display = 'none';
    document.body.style.cursor = 'grab';
  }
});

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  const t = Date.now() * 0.001;

  // Hub rotation animation
  hubMeshes.forEach((m, i) => {
    m.rotation.y = t * .5 + i;
    m.rotation.x = Math.sin(t * .3 + i) * .2;
  });

  // Sea surface wave animation
  if (seaMesh) {
    const pos = seaMesh.geometry.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i), z = pos.getZ(i);
      pos.setY(i, Math.sin(x * 0.05 + t) * 0.3 + Math.cos(z * 0.04 + t * 0.7) * 0.2 - 0.5);
    }
    pos.needsUpdate = true;
  }

  // Camera inertia
  if (orbitUpdate) orbitUpdate();

  // Zoom animation
  if (zoomAnim) zoomAnim();

  renderer.render(scene, camera);
}

// Check for embed mode (hide UI) or auto-rotate mode
const params = new URLSearchParams(location.search);
const isEmbed = params.has('embed');
const isCompact = params.has('compact');
const isAutoRotate = params.has('autorotate');

// Layer preset from query param: ?layers=terrain,coastline
if (params.has('layers')) {
  const preset = params.get('layers').split(',');
  const allLayers = ['terrain', 'roads', 'hubs', 'contours', 'coastline'];
  allLayers.forEach(l => { layerState[l] = preset.includes(l); });
}

if (isEmbed) {
  document.querySelector('.header').style.display = 'none';
  document.querySelector('.panel').style.display = 'none';
  document.querySelector('.info').style.display = 'none';
}
if (isCompact) {
  document.querySelector('.header').style.display = 'none';
  document.querySelector('.info').style.display = 'none';
  document.querySelector('.panel').style.top = '16px';
}

initThree();
buildCoastline();
buildContours();
buildTerrain();
buildIslandTerrain();
buildRoads();
buildHubs();
setupOrbit();
if (!isEmbed) setupUI();
updateLayers();

// Sync toggle UI to match layer preset
if (params.has('layers')) {
  Object.keys(layerState).forEach(l => {
    const tog = document.getElementById('tog-' + l);
    if (tog) tog.className = 'layer-toggle ' + (layerState[l] ? 'on' : 'off');
  });
}

if (isAutoRotate) {
  let theta = 0.4;
  setInterval(() => {
    theta += 0.003;
    const radius = 140, phi = 0.7, ty = 10;
    camera.position.set(
      radius * Math.sin(phi) * Math.sin(theta),
      ty + radius * Math.cos(phi),
      radius * Math.sin(phi) * Math.cos(theta)
    );
    camera.lookAt(0, ty, 0);
  }, 16);
}

// Keyboard shortcuts: 1-5 toggle layers, R reset
function handleKey(key) {
  const layerKeys = { '1': 'terrain', '2': 'roads', '3': 'hubs', '4': 'coastline' };
  if (layerKeys[key]) {
    const l = layerKeys[key];
    layerState[l] = !layerState[l];
    const tog = document.getElementById('tog-' + l);
    if (tog) tog.className = 'layer-toggle ' + (layerState[l] ? 'on' : 'off');
    updateLayers();
  }
  if (key === 'r' || key === 'R') {
    Object.keys(layerState).forEach(l => { layerState[l] = l !== 'terrain'; });
    Object.keys(layerState).forEach(l => {
      const tog = document.getElementById('tog-' + l);
      if (tog) tog.className = 'layer-toggle ' + (layerState[l] ? 'on' : 'off');
    });
    sepVal = 0; exagVal = 8; contourInterval = 10;
    const sepEl = document.getElementById('separation');
    const exgEl = document.getElementById('exaggeration');
    if (sepEl) sepEl.value = 0;
    if (exgEl) exgEl.value = 8;
    document.querySelectorAll('.cbtn').forEach(b => b.classList.toggle('active', b.dataset.v === '10'));
    rebuildAll();
  }
}

document.addEventListener('keydown', (e) => { handleKey(e.key); });
window.addEventListener('message', (e) => { if (e.data && e.data.type === 'keydown') handleKey(e.data.key); });

animate();
</script>
